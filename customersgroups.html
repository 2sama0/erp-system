<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجموعات العملاء - نظام إدارة معرض السيارات</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/tables.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dashboard-page">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-car"></i>
                <div class="logo-text">
                    <h2>CarDealer</h2>
                    <span>ERP System</span>
                </div>
            </div>
            <button class="sidebar-toggle" id="sidebarToggle">
                <i class="fas fa-bars"></i>
            </button>
        </div>

        <div class="user-profile">
            <div class="user-avatar">
                <img src="assets/images/user-avatar.png" alt="صورة المستخدم">
                <span class="user-status online"></span>
            </div>
            <div class="user-info">
                <h3 id="userName">أحمد السليم</h3>
                <span class="user-role" id="userRole">مدير المبيعات</span>
            </div>
        </div>

        <nav class="sidebar-menu">
            <div class="menu-section">
                <h4 class="section-title">القائمة الرئيسية</h4>
                <ul>
                    <li class="menu-item"><a href="dashboard.html"><i class="fas fa-home"></i><span>لوحة التحكم</span></a></li>
                    <li class="menu-item"><a href="sales.html"><i class="fas fa-shopping-cart"></i><span>إدارة المبيعات</span></a></li>
                    <li class="menu-item"><a href="inventory.html"><i class="fas fa-warehouse"></i><span>إدارة المخزون</span></a></li>
                    <li class="menu-item active"><a href="customers.html"><i class="fas fa-users"></i><span>إدارة العملاء</span></a></li>
                </ul>
            </div>
        </nav>

        <div class="sidebar-footer">
            <button class="btn-logout" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i>
                <span>تسجيل الخروج</span>
            </button>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <h1 class="page-title">مجموعات العملاء</h1>
                <nav class="breadcrumb">
                    <a href="dashboard.html">الرئيسية</a>
                    <i class="fas fa-chevron-left"></i>
                    <span>مجموعات العملاء</span>
                </nav>
            </div>

            <div class="topbar-right">
                <div class="date-time">
                    <i class="fas fa-calendar-alt"></i>
                    <span id="currentDate"></span>
                </div>
            </div>
        </header>

        <div class="page-tabs">
            <a href="customers.html" class="tab-btn">العملاء</a>
            <a href="customersleads.html" class="tab-btn">العملاء المحتملين</a>
            <a href="customersgroups.html" class="tab-btn active">مجموعات العملاء</a>
            <a href="customerscommunications.html" class="tab-btn">الاتصالات</a>
            <a href="customersreports.html" class="tab-btn">تقارير العملاء</a>
        </div>

        <div class="content-wrapper">
            <div class="row">
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-header">
                            <h3>إضافة مجموعة جديدة</h3>
                        </div>
                        <div class="card-body">
                            <form id="groupForm" onsubmit="saveGroup(event)">
                                <div class="form-group">
                                    <label>اسم المجموعة</label>
                                    <input type="text" class="form-control" id="groupName" required>
                                </div>
                                <div class="form-group">
                                    <label>الوصف</label>
                                    <textarea class="form-control" id="groupDescription" rows="3"></textarea>
                                </div>
                                <div class="form-group">
                                    <label>خصم المجموعة (%)</label>
                                    <input type="number" class="form-control" id="groupDiscount" min="0" max="100" step="0.1" placeholder="0">
                                </div>
                                <button type="submit" class="btn btn-primary btn-block">
                                    <i class="fas fa-save"></i>
                                    حفظ المجموعة
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="card">
                        <div class="card-header">
                            <h3>مجموعات العملاء</h3>
                        </div>
                        <div class="card-body" id="customerGroups">
                            <!-- سيتم ملؤه بواسطة JavaScript -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/customersgroups.js"></script>
</body>
</html>
