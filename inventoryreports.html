<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقارير المخزون - إدارة المخزون</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/tables.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .topbar-nav {
            display: flex;
            gap: 1rem;
            margin-right: 2rem;
        }
        .topbar-nav .nav-link {
            padding: 0.5rem 1rem;
            border-radius: var(--border-radius);
            color: var(--text-secondary);
            font-weight: 500;
            transition: var(--transition);
            text-decoration: none;
        }
        .topbar-nav .nav-link:hover {
            background-color: var(--bg-secondary);
            color: var(--primary-color);
        }
        .topbar-nav .nav-link.active {
            background-color: var(--primary-color);
            color: white;
        }
    </style>
</head>
<body class="dashboard-page">
   <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-car"></i>
                <div class="logo-text">
                    <h2>CarDealer</h2>
                    <span>ERP System</span>
                </div>
            </div>
            <button class="sidebar-toggle" id="sidebarToggle">
                <i class="fas fa-bars"></i>
            </button>
        </div>

        <div class="user-profile">
            <div class="user-avatar">
                <img src="assets/images/user-avatar.png" alt="صورة المستخدم">
                <span class="user-status online"></span>
            </div>
            <div class="user-info">
                <h3 id="userName">أحمد السليم</h3>
                <span class="user-role" id="userRole">مدير المخزون</span>
            </div>
        </div>

        <nav class="sidebar-menu">
            <div class="menu-section">
                <h4 class="section-title">القائمة الرئيسية</h4>
                <ul>
                    <li class="menu-item">
                        <a href="dashboard.html">
                            <i class="fas fa-home"></i>
                            <span>لوحة التحكم</span>
                        </a>
                    </li>
                    <li class="menu-item">
                        <a href="sales.html">
                            <i class="fas fa-shopping-cart"></i>
                            <span>إدارة المبيعات</span>
                        </a>
                    </li>
                    <li class="menu-item active">
                        <a href="inventory.html">
                            <i class="fas fa-warehouse"></i>
                            <span>إدارة المخزون</span>
                            <span class="menu-badge warning">5</span>
                        </a>
                    </li>
                    <li class="menu-item">
                        <a href="customers.html">
                            <i class="fas fa-users"></i>
                            <span>إدارة العملاء</span>
                        </a>
                    </li>
                </ul>
            </div>
        </nav>

        <div class="sidebar-footer">
            <button class="btn-logout" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i>
                <span>تسجيل الخروج</span>
            </button>
        </div>
    </aside>
    <main class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <h1 class="page-title">تقارير المخزون</h1>
                <nav class="breadcrumb">
                    <a href="dashboard.html">الرئيسية</a>
                    <i class="fas fa-chevron-left"></i>
                    <span>المخزون</span>
                </nav>
                <div class="topbar-nav">
                    <a href="inventory.html" class="nav-link">المنتجات</a>
                    <a href="inventorycategories.html" class="nav-link">التصنيفات</a>
                    <a href="inventorywarehouses.html" class="nav-link">المخازن</a>
                    <a href="inventorymovements.html" class="nav-link">حركة المخزون</a>
                    <a href="inventoryreports.html" class="nav-link active">التقارير</a>
                </div>
            </div>
            <div class="topbar-right">
                <div class="date-time">
                    <i class="fas fa-calendar-alt"></i>
                    <span id="currentDate"></span>
                </div>
            </div>
        </header>

        <!-- محتوى التقارير -->
        <div class="content-wrapper">
            <div class="inventory-reports">
                <div class="row">
                    <div class="col-md-12">
                        <div class="card">
                            <div class="card-header">
                                <h3>تقارير المخزون</h3>
                                <div class="report-period">
                                    <input type="date" id="reportStartDate" class="form-control">
                                    <span>إلى</span>
                                    <input type="date" id="reportEndDate" class="form-control">
                                    <button class="btn btn-primary" onclick="generateReport()">
                                        <i class="fas fa-chart-line"></i>
                                        إنشاء تقرير
                                    </button>
                                </div>
                            </div>
                            <div class="card-body">
                                <div class="reports-container">
                                    <div class="report-charts">
                                        <div class="chart-container">
                                            <canvas id="inventoryChart"></canvas>
                                        </div>
                                    </div>
                                    <div class="report-summary">
                                        <h4>ملخص المخزون</h4>
                                        <div class="summary-cards"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/inventory.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (!checkAuthStatus()) window.location.href = 'login.html';
            updateDate();
            initSidebar();
        });

        function generateReport() {
            const startDate = document.getElementById('reportStartDate').value;
            const endDate = document.getElementById('reportEndDate').value;
            alert(`جاري إنشاء تقرير من ${startDate} إلى ${endDate}`);

            // رسم المخطط بشكل افتراضي (يمكن استدعاء دالة من inventory.js)
            renderInventoryChart();
        }

        // دالة مساعدة لرسم المخطط (مأخوذة من inventory.js مع تعديل بسيط)
        function renderInventoryChart() {
            const canvas = document.getElementById('inventoryChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['سيارات', 'اكسسوارات', 'قطع غيار', 'خدمات'],
                    datasets: [{
                        label: 'قيمة المخزون',
                        data: [4500000, 1500000, 1200000, 800000],
                        backgroundColor: ['#3498db', '#2ecc71', '#f39c12', '#9b59b6']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } }
                }
            });
        }
    </script>
</body>
</html>
